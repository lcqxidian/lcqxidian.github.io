<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公开留言板 | LCQ.Space</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="admin_auth.js?v=20260327a"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="bg-slate-950 text-slate-300 font-sans antialiased h-screen flex flex-col selection:bg-indigo-900 selection:text-indigo-100">

    <div class="flex-1 max-w-4xl w-full mx-auto sm:py-6 flex flex-col h-full">
        <div class="flex-1 bg-slate-900 sm:border border-indigo-900/50 sm:rounded-2xl shadow-2xl flex flex-col overflow-hidden relative">

            <div class="p-4 sm:p-5 border-b border-slate-800 flex justify-between items-center bg-slate-900/50 gap-4">
                <div class="flex items-center gap-3 min-w-0">
                    <a href="index.html" class="p-2 bg-slate-800 hover:bg-slate-700 text-slate-400 hover:text-slate-200 rounded-lg transition-colors shrink-0" title="返回主页">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    </a>
                    <div class="min-w-0">
                        <h3 class="text-xl font-bold text-indigo-400 flex items-center gap-2">
                            <span class="text-lg">💬</span> 公开留言板
                        </h3>
                        <p id="public-visibility-note" class="text-xs text-slate-500 mt-1 truncate">未登录时，爸妈留言会保持隐藏。</p>
                    </div>
                </div>

                <div class="flex items-center gap-3 shrink-0">
                    <a href="weekly_plans.html" class="hidden sm:inline-flex px-3 py-2 bg-teal-500/10 hover:bg-teal-500/20 text-teal-300 text-sm font-semibold rounded-lg border border-teal-500/20 transition-colors">
                        Weekly Plans
                    </a>
                    <div id="public-role-badge" class="px-3 py-2 rounded-lg border border-slate-700 bg-slate-800 text-xs font-semibold text-slate-300">
                        当前身份：访客
                    </div>
                    <button id="refresh-public-board-btn" class="text-indigo-500/70 hover:text-indigo-400 transition-all outline-none p-1" title="刷新留言">
                        <svg id="refresh-public-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    </button>
                </div>
            </div>

            <div id="public-msg-list" class="flex-1 overflow-y-auto p-4 sm:p-6 space-y-4 bg-slate-950/50 relative">
            </div>

            <form id="public-msg-form" class="p-4 sm:p-5 border-t border-slate-800 bg-slate-900 shrink-0">
                <div class="flex gap-2 sm:gap-3 items-center">
                    <div class="relative shrink-0">
                        <select id="public-msg-author" class="appearance-none bg-slate-800 border border-slate-700 rounded-lg pl-3 sm:pl-4 pr-7 sm:pr-8 py-2.5 text-indigo-400 font-bold focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors cursor-pointer text-center text-sm sm:text-base">
                            <option value="friend">friend</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-indigo-500/70">
                            <svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                        </div>
                    </div>

                    <input type="text" id="public-msg-input" required autocomplete="off" class="flex-1 w-full bg-slate-950 border border-slate-700 rounded-lg px-3 sm:px-4 py-2.5 text-slate-200 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors placeholder-slate-600 text-sm sm:text-base" placeholder="想对作者说点什么...">
                    <button type="submit" id="public-msg-submit" class="px-4 sm:px-6 py-2.5 bg-indigo-600 hover:bg-indigo-500 text-white font-medium rounded-lg shadow-lg shadow-indigo-500/20 transition-all whitespace-nowrap text-sm sm:text-base">
                        发送
                    </button>
                </div>
                <p id="public-form-hint" class="text-xs text-slate-500 mt-3">未登录时会默认以 friend 身份留言。</p>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://hlmpgjvvnezpgobgbtwy.supabase.co";
        const SUPABASE_KEY = "sb_publishable_QJ8O--Xo_AQLqEGmibpiGQ_iO75gSig";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const refreshPublicBoardBtn = document.getElementById('refresh-public-board-btn');
        const refreshPublicIcon = document.getElementById('refresh-public-icon');
        const publicMsgList = document.getElementById('public-msg-list');
        const publicMsgForm = document.getElementById('public-msg-form');
        const publicMsgInput = document.getElementById('public-msg-input');
        const publicMsgAuthor = document.getElementById('public-msg-author');
        const publicMsgSubmitBtn = document.getElementById('public-msg-submit');
        const publicRoleBadge = document.getElementById('public-role-badge');
        const publicVisibilityNote = document.getElementById('public-visibility-note');
        const publicFormHint = document.getElementById('public-form-hint');

        const escapeHtml = (value = '') => String(value)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');

        const getCurrentRoleState = () => {
            if (!window.LCQAdminAuth) {
                return {
                    role: null,
                    roleLabel: '访客',
                    canViewFamilyMessages: false,
                    defaultAuthor: 'friend'
                };
            }

            const state = window.LCQAdminAuth.getState();
            if (state.role === 'dad') {
                return { role: 'dad', roleLabel: '爸', canViewFamilyMessages: true, defaultAuthor: '爸' };
            }
            if (state.role === 'mom') {
                return { role: 'mom', roleLabel: '妈', canViewFamilyMessages: true, defaultAuthor: '妈' };
            }
            if (state.role === 'admin') {
                return { role: 'admin', roleLabel: '管理员', canViewFamilyMessages: true, defaultAuthor: '管理员' };
            }
            if (state.role === 'xiaobao') {
                return { role: 'xiaobao', roleLabel: '方小宝', canViewFamilyMessages: true, defaultAuthor: '方小宝' };
            }
            if (state.role === 'friend') {
                return { role: 'friend', roleLabel: 'friend', canViewFamilyMessages: false, defaultAuthor: 'friend' };
            }
            return { role: null, roleLabel: '访客', canViewFamilyMessages: false, defaultAuthor: 'friend' };
        };

        const applyPublicRoleUI = () => {
            const roleState = getCurrentRoleState();
            publicRoleBadge.textContent = `当前身份：${roleState.roleLabel}`;
            publicRoleBadge.className = roleState.role === 'admin' || roleState.role === 'xiaobao'
                ? 'px-3 py-2 rounded-lg border border-emerald-500/30 bg-emerald-500/10 text-xs font-semibold text-emerald-300'
                : roleState.role === 'dad' || roleState.role === 'mom'
                    ? 'px-3 py-2 rounded-lg border border-cyan-500/30 bg-cyan-500/10 text-xs font-semibold text-cyan-300'
                    : roleState.role === 'friend'
                        ? 'px-3 py-2 rounded-lg border border-indigo-500/30 bg-indigo-500/10 text-xs font-semibold text-indigo-300'
                        : 'px-3 py-2 rounded-lg border border-slate-700 bg-slate-800 text-xs font-semibold text-slate-300';

            publicVisibilityNote.textContent = roleState.canViewFamilyMessages
                ? '当前身份可查看爸妈以往发出的留言。'
                : '当前身份不可查看爸妈留言，长辈内容会保持隐藏。';

            publicMsgAuthor.innerHTML = `<option value="${roleState.defaultAuthor}">${roleState.defaultAuthor}</option>`;
            publicMsgAuthor.value = roleState.defaultAuthor;
            publicMsgAuthor.disabled = true;

            publicFormHint.textContent = roleState.role === 'admin'
                ? '当前以管理员身份留言。'
                : roleState.role === 'xiaobao'
                    ? '当前以方小宝身份留言。'
                : roleState.role === 'dad' || roleState.role === 'mom'
                    ? `当前以${roleState.roleLabel}身份留言。`
                    : roleState.role === 'friend'
                        ? '当前以 friend 身份留言。'
                        : '未登录时会默认以 friend 身份留言。';
        };

        async function loadPublicMessages() {
            const roleState = getCurrentRoleState();

            if (refreshPublicIcon) refreshPublicIcon.classList.add('animate-spin');

            publicMsgList.innerHTML = '<div class="absolute inset-0 flex items-center justify-center text-indigo-500/50 animate-pulse">正在连接公开频段...</div>';
            try {
                const { data, error } = await supabaseClient
                    .from('public_messages')
                    .select('*')
                    .order('created_at', { ascending: true });

                if (error) throw error;

                publicMsgList.innerHTML = '';
                if (!data || data.length === 0) {
                    publicMsgList.innerHTML = '<div class="absolute inset-0 flex items-center justify-center text-slate-600">这里空空如也，来抢首条留言吧！</div>';
                    return;
                }

                data.forEach((message) => {
                    let msgObj;
                    try {
                        msgObj = JSON.parse(message.content);
                    } catch (error) {
                        msgObj = { author: '?', text: message.content };
                    }

                    const safeAuthor = escapeHtml(msgObj.author || '?');
                    const safeContent = escapeHtml(msgObj.text || '');
                    const isParentMessage = safeAuthor === '爸' || safeAuthor === '妈';
                    const visibleContent = (isParentMessage && !roleState.canViewFamilyMessages)
                        ? '<span class="text-slate-500 italic tracking-widest text-lg">*******</span> <span class="text-xs text-indigo-500/50 ml-2">(已隐藏)</span>'
                        : safeContent;
                    const avatarText = safeAuthor.length > 2 ? safeAuthor.slice(0, 1) : safeAuthor;
                    const date = new Date(message.created_at).toLocaleString('zh-CN', { hour12: false });

                    const div = document.createElement('div');
                    div.className = 'bg-slate-800/80 p-4 rounded-xl border border-slate-700/50 hover:border-indigo-500/30 transition-colors flex gap-4 items-start';
                    div.innerHTML = `
                        <div class="shrink-0 mt-1">
                            <div class="w-10 h-10 rounded-full bg-gradient-to-br from-indigo-500 to-blue-700 flex items-center justify-center text-white font-bold text-lg shadow-lg shadow-indigo-500/20 border border-indigo-500/30 uppercase">
                                ${avatarText}
                            </div>
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-3 mb-1.5 flex-wrap">
                                <span class="text-indigo-400 font-bold">${safeAuthor}</span>
                                <span class="text-xs text-slate-500 font-mono mt-0.5">${date}</span>
                            </div>
                            <div class="text-slate-200 text-sm leading-relaxed break-words">${visibleContent}</div>
                        </div>
                    `;
                    publicMsgList.appendChild(div);
                });

                setTimeout(() => {
                    publicMsgList.scrollTop = publicMsgList.scrollHeight;
                }, 50);
            } catch (err) {
                console.error('拉取公开留言失败:', err);
                publicMsgList.innerHTML = '<div class="absolute inset-0 flex items-center justify-center text-red-500/80">连接断开（请确认已在 Supabase 创建 public_messages 表）</div>';
            } finally {
                if (refreshPublicIcon) refreshPublicIcon.classList.remove('animate-spin');
            }
        }

        refreshPublicBoardBtn.addEventListener('click', loadPublicMessages);

        publicMsgForm.addEventListener('submit', async (event) => {
            event.preventDefault();

            const textContent = publicMsgInput.value.trim();
            const authorChoice = publicMsgAuthor.value;
            if (!textContent) return;

            publicMsgSubmitBtn.disabled = true;
            publicMsgSubmitBtn.innerHTML = '发送中...';

            const payloadContent = JSON.stringify({
                author: authorChoice,
                text: textContent
            });

            try {
                const { error } = await supabaseClient
                    .from('public_messages')
                    .insert([{ content: payloadContent }]);

                if (error) throw error;

                publicMsgInput.value = '';
                await loadPublicMessages();
            } catch (err) {
                console.error('发送留言失败:', err);
                alert('发送失败，请检查网络或数据库配置！');
            } finally {
                publicMsgSubmitBtn.disabled = false;
                publicMsgSubmitBtn.innerHTML = '发送';
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            applyPublicRoleUI();
            loadPublicMessages();
        });

        window.addEventListener('lcq-admin-auth-changed', () => {
            applyPublicRoleUI();
            loadPublicMessages();
        });
    </script>
</body>
</html>
