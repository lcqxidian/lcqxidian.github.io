<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Space | LCQ.Space</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="bg-slate-950 text-slate-300 font-sans antialiased h-screen flex flex-col selection:bg-fuchsia-900 selection:text-fuchsia-100 relative overflow-hidden">

    <div id="login-view" class="absolute inset-0 z-50 flex items-center justify-center bg-slate-950/90 backdrop-blur-md transition-opacity duration-500">
        <div class="bg-slate-900 border border-fuchsia-900/50 rounded-2xl w-full max-w-sm mx-4 shadow-2xl p-8 text-center relative overflow-hidden">
            <div class="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-32 bg-fuchsia-600/20 rounded-full blur-3xl pointer-events-none"></div>

            <h3 class="text-2xl font-bold text-fuchsia-400 mb-3 flex items-center justify-center gap-2 relative z-10">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                Secret Space
            </h3>
            <p class="text-sm text-slate-500 mb-5 relative z-10">输入共享口令后进入私密留言板，留言与私密陪伴 AI 都走服务端私密通道。</p>
            <input type="password" id="secret-pwd-input" autocomplete="off" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-4 py-3 text-center text-fuchsia-400 tracking-[0.3em] font-mono focus:outline-none focus:border-fuchsia-500 focus:ring-1 focus:ring-fuchsia-500 transition-colors mb-4 relative z-10" placeholder="Enter Password" autofocus>
            <p id="pwd-error" class="text-red-400 text-xs mb-4 hidden relative z-10">密码错误，访问拒绝</p>
            <div class="flex gap-3 relative z-10">
                <a href="index.html" class="flex-1 px-4 py-2.5 bg-slate-800 hover:bg-slate-700 text-slate-300 font-medium rounded-lg transition-all block text-center">返回主页</a>
                <button id="pwd-submit-btn" class="flex-1 px-4 py-2.5 bg-fuchsia-600 hover:bg-fuchsia-500 text-white font-medium rounded-lg shadow-lg shadow-fuchsia-500/20 transition-all">进入</button>
            </div>
        </div>
    </div>

    <div id="board-view" class="flex-1 max-w-3xl w-full mx-auto sm:py-6 flex flex-col h-full opacity-0 pointer-events-none transition-opacity duration-500">
        <div class="flex-1 bg-slate-900 sm:border border-fuchsia-900/50 sm:rounded-2xl shadow-2xl flex flex-col overflow-hidden relative">

            <div class="p-4 sm:p-5 border-b border-slate-800 flex justify-between items-center bg-slate-900/50 gap-4">
                <div class="flex items-center gap-3 min-w-0">
                    <a href="index.html" class="p-2 bg-slate-800 hover:bg-slate-700 text-slate-400 hover:text-slate-200 rounded-lg transition-colors shrink-0" title="返回主页">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    </a>
                    <div class="min-w-0">
                        <h3 class="text-xl font-bold text-fuchsia-400 flex items-center gap-2">
                            <span class="text-lg">🌌</span> 隐藏维度留言板
                        </h3>
                        <p id="secret-access-note" class="text-xs text-slate-500 mt-1">等待口令验证...</p>
                    </div>
                </div>
                <div class="flex items-center gap-3 shrink-0">
                    <span id="secret-ai-pill" class="inline-flex items-center rounded-full border border-slate-700 bg-slate-800/80 px-3 py-1 text-xs font-semibold text-slate-400">
                        小宝休息中
                    </span>
                    <button id="refresh-board-btn" class="text-fuchsia-500/70 hover:text-fuchsia-400 transition-all outline-none p-1 shrink-0" title="刷新留言">
                        <svg id="refresh-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    </button>
                </div>
            </div>

            <div id="secret-msg-list" class="flex-1 overflow-y-auto p-4 sm:p-6 space-y-4 bg-slate-950/50 relative">
            </div>

            <form id="secret-msg-form" class="p-4 sm:p-5 border-t border-slate-800 bg-slate-900 shrink-0">
                <div class="flex gap-2 sm:gap-3 items-center">
                    <div class="relative shrink-0">
                        <select id="secret-msg-author" class="appearance-none bg-slate-800 border border-slate-700 rounded-lg pl-3 sm:pl-4 pr-7 sm:pr-8 py-2.5 text-fuchsia-400 font-bold focus:outline-none focus:border-fuchsia-500 focus:ring-1 focus:ring-fuchsia-500 transition-colors cursor-pointer text-center text-sm sm:text-base">
                            <option value="f">f</option>
                            <option value="l">l</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-fuchsia-500/70">
                            <svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                        </div>
                    </div>

                    <input type="text" id="secret-msg-input" required autocomplete="off" class="flex-1 w-full bg-slate-950 border border-slate-700 rounded-lg px-3 sm:px-4 py-2.5 text-slate-200 focus:outline-none focus:border-fuchsia-500 focus:ring-1 focus:ring-fuchsia-500 transition-colors placeholder-slate-600 text-sm sm:text-base" placeholder="在这里留下你的足迹...">
                    <button type="submit" id="secret-msg-submit" class="px-4 sm:px-6 py-2.5 bg-fuchsia-600 hover:bg-fuchsia-500 text-white font-medium rounded-lg shadow-lg shadow-fuchsia-500/20 transition-all whitespace-nowrap text-sm sm:text-base">
                        发送
                    </button>
                </div>
                <div class="mt-3 flex flex-col gap-1 sm:flex-row sm:items-center sm:justify-between">
                    <p class="text-xs text-slate-500">输入 `@小宝` 唤起陪伴模式，输入 `@关闭` 让它先安静一下。</p>
                    <p id="secret-board-status" class="text-xs text-slate-500"></p>
                </div>
            </form>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://hlmpgjvvnezpgobgbtwy.supabase.co";
        const SUPABASE_KEY = "sb_publishable_QJ8O--Xo_AQLqEGmibpiGQ_iO75gSig";
        const SECRET_FUNCTION_URL = `${SUPABASE_URL.replace(/\/+$/, '')}/functions/v1/secret-companion`;
        const SECRET_TOKEN_STORAGE_KEY = 'lcq_secret_board_access_token_v1';
        const SECRET_AI_ACTIVE_STORAGE_KEY = 'lcq_secret_board_ai_active_v1';

        const loginView = document.getElementById('login-view');
        const boardView = document.getElementById('board-view');
        const pwdInput = document.getElementById('secret-pwd-input');
        const pwdSubmit = document.getElementById('pwd-submit-btn');
        const pwdError = document.getElementById('pwd-error');
        const refreshBoardBtn = document.getElementById('refresh-board-btn');
        const refreshIcon = document.getElementById('refresh-icon');
        const msgList = document.getElementById('secret-msg-list');
        const msgForm = document.getElementById('secret-msg-form');
        const msgAuthorSelect = document.getElementById('secret-msg-author');
        const msgInput = document.getElementById('secret-msg-input');
        const msgSubmitBtn = document.getElementById('secret-msg-submit');
        const secretAccessNote = document.getElementById('secret-access-note');
        const secretAiPill = document.getElementById('secret-ai-pill');
        const secretBoardStatus = document.getElementById('secret-board-status');

        let hasBoardAccess = false;
        let boardServiceStatus = { boardConfigured: false, aiConfigured: false };
        let secretAccessToken = localStorage.getItem(SECRET_TOKEN_STORAGE_KEY) || '';
        let aiCompanionActive = sessionStorage.getItem(SECRET_AI_ACTIVE_STORAGE_KEY) === 'true';

        const escapeHtml = (value = '') => String(value)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');

        const requestSecretService = async (payload) => {
            const response = await fetch(SECRET_FUNCTION_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'apikey': SUPABASE_KEY,
                    'Authorization': `Bearer ${SUPABASE_KEY}`
                },
                body: JSON.stringify(payload || {})
            });

            const data = await response.json().catch(() => ({}));
            if (!response.ok) {
                const error = new Error(data.error || `私密服务请求失败（HTTP ${response.status}）`);
                error.status = response.status;
                error.payload = data;
                throw error;
            }
            if (data.error) {
                const error = new Error(data.error);
                error.payload = data;
                throw error;
            }
            return data;
        };

        const setBoardStatus = (text, isError = false) => {
            secretBoardStatus.textContent = text || '';
            secretBoardStatus.className = `text-xs ${isError ? 'text-red-400' : 'text-slate-500'}`;
        };

        const persistCompanionMode = () => {
            if (aiCompanionActive) {
                sessionStorage.setItem(SECRET_AI_ACTIVE_STORAGE_KEY, 'true');
            } else {
                sessionStorage.removeItem(SECRET_AI_ACTIVE_STORAGE_KEY);
            }
        };

        const renderCompanionState = () => {
            if (!boardServiceStatus.aiConfigured) {
                aiCompanionActive = false;
                persistCompanionMode();
                secretAiPill.textContent = '小宝未配置';
                secretAiPill.className = 'inline-flex items-center rounded-full border border-amber-500/30 bg-amber-500/10 px-3 py-1 text-xs font-semibold text-amber-300';
                msgInput.placeholder = '在这里留下你的足迹...';
                return;
            }

            if (aiCompanionActive) {
                secretAiPill.textContent = '小宝陪伴中';
                secretAiPill.className = 'inline-flex items-center rounded-full border border-fuchsia-500/30 bg-fuchsia-500/10 px-3 py-1 text-xs font-semibold text-fuchsia-300';
                msgInput.placeholder = '小宝在听，你继续说吧...';
            } else {
                secretAiPill.textContent = '小宝休息中';
                secretAiPill.className = 'inline-flex items-center rounded-full border border-slate-700 bg-slate-800/80 px-3 py-1 text-xs font-semibold text-slate-400';
                msgInput.placeholder = '在这里留下你的足迹...';
            }
        };

        const setCompanionActive = (active, noticeText = '') => {
            aiCompanionActive = !!active;
            persistCompanionMode();
            renderCompanionState();
            if (noticeText) {
                setBoardStatus(noticeText);
            }
        };

        const storeAccessToken = (token) => {
            secretAccessToken = String(token || '');
            if (secretAccessToken) {
                localStorage.setItem(SECRET_TOKEN_STORAGE_KEY, secretAccessToken);
            } else {
                localStorage.removeItem(SECRET_TOKEN_STORAGE_KEY);
            }
        };

        const clearBoardSession = () => {
            storeAccessToken('');
            setCompanionActive(false);
        };

        const unlockBoard = async (reasonText) => {
            hasBoardAccess = true;
            loginView.classList.add('opacity-0', 'pointer-events-none');
            boardView.classList.remove('opacity-0', 'pointer-events-none');
            secretAccessNote.textContent = reasonText;
            await refreshServiceStatus();
            return await loadSecretMessages();
        };

        const relockBoard = (message = '私密访问凭证已失效，请重新输入口令。') => {
            hasBoardAccess = false;
            clearBoardSession();
            boardView.classList.add('opacity-0', 'pointer-events-none');
            loginView.classList.remove('opacity-0', 'pointer-events-none');
            secretAccessNote.textContent = '等待口令验证...';
            msgList.innerHTML = '';
            setBoardStatus('');
            pwdError.textContent = message;
            pwdError.classList.remove('hidden');
        };

        const refreshServiceStatus = async () => {
            try {
                const status = await requestSecretService({ action: 'status' });
                boardServiceStatus = {
                    boardConfigured: !!status.boardConfigured,
                    aiConfigured: !!status.aiConfigured
                };
                renderCompanionState();
            } catch (error) {
                boardServiceStatus = { boardConfigured: false, aiConfigured: false };
                renderCompanionState();
                setBoardStatus(error.message || '私密服务状态检查失败。', true);
            }
        };

        const verifyPassword = async () => {
            const password = pwdInput.value.trim();
            if (!password) {
                pwdError.textContent = '请输入私密口令';
                pwdError.classList.remove('hidden');
                return;
            }

            pwdSubmit.disabled = true;
            pwdSubmit.textContent = '验证中...';
            pwdError.classList.add('hidden');

            try {
                const data = await requestSecretService({
                    action: 'auth',
                    password
                });
                storeAccessToken(data.accessToken || '');
                pwdInput.value = '';
                await unlockBoard(data.accessNote || '口令验证通过，已进入私密留言板。');
            } catch (error) {
                pwdError.textContent = error.message || '口令验证失败';
                pwdError.classList.remove('hidden');
                pwdInput.classList.add('border-red-500');
                setTimeout(() => pwdInput.classList.remove('border-red-500'), 1500);
            } finally {
                pwdSubmit.disabled = false;
                pwdSubmit.textContent = '进入';
            }
        };

        const tryRestoreSession = async () => {
            if (!secretAccessToken) return false;

            try {
                return !!(await unlockBoard('私密访问凭证仍然有效，已恢复进入状态。'));
            } catch (error) {
                clearBoardSession();
                return false;
            }
        };

        pwdSubmit.addEventListener('click', verifyPassword);
        pwdInput.addEventListener('keypress', (event) => {
            if (event.key === 'Enter') verifyPassword();
        });

        refreshBoardBtn.addEventListener('click', () => {
            if (hasBoardAccess) loadSecretMessages();
        });

        async function loadSecretMessages() {
            if (!secretAccessToken) {
                relockBoard();
                return false;
            }

            if (refreshIcon) refreshIcon.classList.add('animate-spin');

            msgList.innerHTML = '<div class="absolute inset-0 flex items-center justify-center text-fuchsia-500/50 animate-pulse">正在连接隐藏维度...</div>';
            try {
                const data = await requestSecretService({
                    action: 'load-messages',
                    accessToken: secretAccessToken
                });
                const messages = Array.isArray(data.messages) ? data.messages : [];
                msgList.innerHTML = '';
                if (!messages.length) {
                    msgList.innerHTML = '<div class="absolute inset-0 flex items-center justify-center text-slate-600">这里空空如也，留下第一句话吧！</div>';
                    return true;
                }

                messages.forEach((message) => {
                    const safeContent = escapeHtml(message.text || '');
                    const isAi = message.type === 'private_ai' || message.author === '小宝';
                    const authorLabel = isAi ? '小宝' : String(message.author || '?').toUpperCase();
                    const safeAuthor = escapeHtml(authorLabel);
                    const date = new Date(message.createdAt).toLocaleString('zh-CN', { hour12: false });

                    const div = document.createElement('div');
                    div.className = isAi
                        ? 'bg-gradient-to-br from-fuchsia-950/60 to-violet-950/50 p-4 rounded-xl border border-fuchsia-500/25 hover:border-fuchsia-400/35 transition-colors flex gap-4 items-start'
                        : 'bg-slate-800/80 p-4 rounded-xl border border-slate-700/50 hover:border-fuchsia-500/30 transition-colors flex gap-4 items-start';
                    div.innerHTML = `
                        <div class="shrink-0 mt-1">
                            <div class="w-10 h-10 rounded-full ${isAi ? 'bg-gradient-to-br from-fuchsia-500 to-violet-700' : 'bg-gradient-to-br from-fuchsia-600 to-purple-800'} flex items-center justify-center text-white font-bold text-lg shadow-lg shadow-fuchsia-500/20 uppercase border border-fuchsia-500/30">
                                ${isAi ? '✦' : safeAuthor}
                            </div>
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-3 mb-1.5 flex-wrap">
                                <span class="${isAi ? 'text-fuchsia-300' : 'text-fuchsia-400'} font-bold">${safeAuthor}</span>
                                <span class="text-xs text-slate-500 font-mono mt-0.5">${date}</span>
                            </div>
                            <div class="${isAi ? 'text-fuchsia-50/95' : 'text-slate-200'} text-sm leading-relaxed break-words">${safeContent}</div>
                        </div>
                    `;
                    msgList.appendChild(div);
                });

                setTimeout(() => {
                    msgList.scrollTop = msgList.scrollHeight;
                }, 50);
                return true;
            } catch (err) {
                console.error('拉取留言失败:', err);
                if (err.status === 401 || /访问凭证/.test(err.message || '')) {
                    relockBoard(err.message);
                    return false;
                }
                msgList.innerHTML = '<div class="absolute inset-0 flex items-center justify-center text-red-500/80">维度连接断开（请确认配置）</div>';
                setBoardStatus(err.message || '读取私密留言失败。', true);
                return false;
            } finally {
                if (refreshIcon) refreshIcon.classList.remove('animate-spin');
            }
        }

        msgForm.addEventListener('submit', async (event) => {
            event.preventDefault();

            const rawInput = msgInput.value.trim();
            const authorChoice = msgAuthorSelect.value;
            if (!rawInput) return;

            if (rawInput === '@关闭') {
                msgInput.value = '';
                setCompanionActive(false, '小宝先安静一下了。');
                return;
            }

            const wakeMatched = rawInput.match(/^@小宝(?:[，,\s]+|$)([\s\S]*)/);
            const shouldWake = !!wakeMatched;
            const messageBody = wakeMatched ? (wakeMatched[1] || '').trim() : rawInput;

            if (shouldWake) {
                setCompanionActive(true, boardServiceStatus.aiConfigured ? '小宝已经加入对话了。' : '陪伴模式已记录，但私密 AI 还没完成服务端配置。');
                if (!messageBody) {
                    msgInput.value = '';
                    return;
                }
            }

            if (!messageBody) return;

            msgSubmitBtn.disabled = true;
            msgSubmitBtn.innerHTML = '传输中...';
            setBoardStatus(aiCompanionActive ? '正在发送，小宝会一起看看。' : '正在发送留言...');

            try {
                await requestSecretService({
                    action: 'post-message',
                    accessToken: secretAccessToken,
                    author: authorChoice,
                    text: messageBody
                });
                msgInput.value = '';

                if (aiCompanionActive && boardServiceStatus.aiConfigured) {
                    await loadSecretMessages();
                    setBoardStatus('小宝在想怎么回你...');
                    await requestSecretService({
                        action: 'chat',
                        accessToken: secretAccessToken,
                        author: authorChoice,
                        text: messageBody
                    });
                    setBoardStatus('小宝刚刚回了一句。');
                } else if (aiCompanionActive && !boardServiceStatus.aiConfigured) {
                    setBoardStatus('留言已发送，但私密 AI 还没完成服务端配置。', true);
                } else {
                    setBoardStatus('留言已发送。');
                }

                await loadSecretMessages();
            } catch (err) {
                console.error('发送留言失败:', err);
                if (err.status === 401 || /访问凭证/.test(err.message || '')) {
                    relockBoard(err.message);
                    return;
                }
                setBoardStatus(err.message || '发送失败，请检查网络或数据库配置。', true);
            } finally {
                msgSubmitBtn.disabled = false;
                msgSubmitBtn.innerHTML = '发送';
            }
        });

        document.addEventListener('DOMContentLoaded', async () => {
            await refreshServiceStatus();
            const restored = await tryRestoreSession();
            if (!restored) {
                renderCompanionState();
            }
        });
    </script>
</body>
</html>
