<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>硬核面试八股文 | 交互式知识舱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body { background-color: #faf9f6; color: #312e81; } /* 靛蓝调深色 */
        
        .code-block {
            background-color: #1e1b4b; 
            color: #e0e7ff;
            font-family: monospace;
            border-radius: 0.5rem;
            padding: 1.25rem;
            overflow-x: auto;
            font-size: 0.875rem;
            line-height: 1.5;
        }

        .tab-btn {
            border-bottom: 2px solid transparent;
            transition: all 0.2s ease;
        }
        
        .tab-btn.active {
            border-bottom-color: #6366f1; 
            color: #4f46e5;
            font-weight: 600;
        }

        .nav-item {
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
        }
        
        .nav-item.active {
            background-color: #eef2ff;
            border-left-color: #6366f1;
            color: #4338ca;
            font-weight: 600;
        }

        .cmd-card {
            transition: all 0.2s ease;
            cursor: pointer;
        }
        
        .cmd-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.1);
            border-color: #a5b4fc;
        }
        
        .cmd-card.active {
            background-color: #e0e7ff;
            border-color: #6366f1;
        }

        .section-view { display: none; animation: fadeIn 0.4s ease-out; }
        .section-view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #c7d2fe; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #a5b4fc; }

        .modal-enter { opacity: 1 !important; pointer-events: auto !important; z-index: 9999 !important; visibility: visible !important; }
        .modal-enter .modal-content { transform: scale(1) !important; }
    </style>
</head>
<body class="h-screen flex flex-col md:flex-row overflow-hidden font-sans">

    <!-- 左侧导航栏 -->
    <nav class="w-full md:w-64 bg-white border-r border-indigo-100 flex-shrink-0 flex flex-col h-auto md:h-full z-10 shadow-sm relative">
        <div class="p-6 border-b border-indigo-50">
            <h1 class="text-xl font-bold text-indigo-900 tracking-tight flex items-center gap-2">
                <span class="text-2xl">🚀</span> 面试核心八股
            </h1>
            <p class="text-xs text-indigo-500 mt-2 leading-relaxed">涵盖操作系统、计算机网络、数据库等底层原理与高频真题。</p>
        </div>
        
        <div id="nav-menu-container" class="flex-1 overflow-y-auto py-4 flex md:flex-col flex-row overflow-x-auto">
            <!-- 静态内容已清空，动态生成的章节会插入到这里 -->
        </div>

        <div class="p-4 border-t border-indigo-50 mt-auto bg-indigo-50/50 hidden md:block">
            <button id="open-modal-btn" class="w-full bg-white border border-indigo-200 hover:border-indigo-400 hover:text-indigo-600 text-indigo-700 text-sm font-bold py-2.5 rounded-lg shadow-sm transition-all flex items-center justify-center gap-2">
                <span>➕</span> 补充面经或卡片
            </button>
        </div>
    </nav>

    <button id="open-modal-btn-mobile" class="md:hidden fixed bottom-4 right-4 z-40 bg-indigo-600 text-white w-12 h-12 rounded-full shadow-xl flex items-center justify-center text-2xl">
        +
    </button>

    <!-- 右侧内容区 -->
    <main id="main-content-container" class="flex-1 overflow-y-auto relative scroll-smooth bg-[#faf9f6]">
        <div class="max-w-5xl mx-auto p-6 md:p-12">
            <!-- 静态内容已清空，章节内容将全部由云端动态生成 -->
        </div>
    </main>

    <!-- 补充卡片弹窗 (Modal) -->
    <div id="add-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-indigo-950/70 backdrop-blur-sm opacity-0 pointer-events-none transition-all duration-300">
        <div class="modal-content bg-white border border-indigo-100 rounded-2xl w-full max-w-lg mx-4 shadow-2xl transform scale-95 transition-all duration-300">
            <div class="p-6 border-b border-indigo-50 flex justify-between items-center">
                <h3 id="modal-title" class="text-xl font-bold text-indigo-900">📝 补充面经或卡片</h3>
                <button id="close-modal-btn" class="text-indigo-400 hover:text-indigo-700 transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <form id="add-card-form" class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-medium text-indigo-800 mb-1">所属章节名 (选择已有或新建)</label>
                    <input type="text" id="card-chapter" list="chapter-datalist" required autocomplete="off" class="w-full bg-indigo-50/50 border border-indigo-200 rounded-lg px-4 py-2.5 text-indigo-900 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors" placeholder="例如：4. Redis 缓存">
                    <datalist id="chapter-datalist"></datalist>
                </div>
                <div>
                    <label class="block text-sm font-medium text-indigo-800 mb-1">考点 / 面试题</label>
                    <input type="text" id="card-title" required autocomplete="off" class="w-full bg-indigo-50/50 border border-indigo-200 rounded-lg px-4 py-2.5 text-indigo-900 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors" placeholder="例如：缓存击穿与雪崩的区别">
                </div>
                <div>
                    <label class="block text-sm font-medium text-indigo-800 mb-1">标准答案 / 核心要点</label>
                    <textarea id="card-content" required rows="4" class="w-full bg-indigo-50/50 border border-indigo-200 rounded-lg px-4 py-2.5 text-indigo-900 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors resize-none text-sm" placeholder="写入你的总结..."></textarea>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-indigo-800 mb-1">图标 (Emoji)</label>
                        <input type="text" id="card-icon" required class="w-full bg-indigo-50/50 border border-indigo-200 rounded-lg px-4 py-2.5 text-indigo-900 text-center text-xl focus:border-indigo-500" value="💡">
                    </div>
                </div>
                
                <div id="form-status" class="hidden text-sm py-2 px-3 rounded"></div>

                <div class="flex justify-end pt-2">
                    <button type="submit" id="submit-btn" class="px-6 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-lg shadow-md transition-all">发布内容</button>
                </div>
            </form>
        </div>
    </div>

    <!-- UI 脚本 -->
    <script>
        // 导航切换
        const navContainer = document.getElementById('nav-menu-container');
        navContainer.addEventListener('click', (e) => {
            const item = e.target.closest('.nav-item');
            if (!item) return;
            navContainer.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
            item.classList.add('active');
            const targetId = item.getAttribute('data-target');
            document.querySelectorAll('.section-view').forEach(sec => {
                if (sec.id === targetId) sec.classList.add('active');
                else sec.classList.remove('active');
            });
        });

        // 标签切换
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const parent = btn.closest('.bg-white');
                parent.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const target = btn.getAttribute('data-tab');
                parent.querySelectorAll('.tab-content').forEach(content => {
                    if (content.id === target) { content.classList.remove('hidden'); content.classList.add('block'); }
                    else { content.classList.remove('block'); content.classList.add('hidden'); }
                });
            });
        });

        // 卡片切换
        const cmdCards = document.querySelectorAll('.cmd-card');
        const detailContents = document.querySelectorAll('.detail-content');
        cmdCards.forEach(card => {
            card.addEventListener('click', () => {
                cmdCards.forEach(c => c.classList.remove('active'));
                card.classList.add('active');
                const target = card.getAttribute('data-detail');
                detailContents.forEach(detail => {
                    if (detail.id === target) { detail.classList.remove('hidden'); detail.classList.add('block'); }
                    else { detail.classList.remove('block'); detail.classList.add('hidden'); }
                });
            });
        });
    </script>

    <!-- Supabase 逻辑 (连接到新的 interview_notes 表) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        let editingCardId = null;
        let currentCloudCards = [];

        const modalEl = document.getElementById('add-modal');
        const statusBoxEl = document.getElementById('form-status');
        const modalTitleEl = document.getElementById('modal-title');
        const submitBtnEl = document.getElementById('submit-btn');
        const formEl = document.getElementById('add-card-form');

        const resetModalToSetup = () => {
            editingCardId = null;
            formEl.reset();
            modalTitleEl.innerHTML = '📝 补充面经或卡片';
            submitBtnEl.textContent = '发布内容';
            statusBoxEl.classList.add('hidden');
        };

        const openModalFn = () => modalEl.classList.add('modal-enter');
        const closeModalFn = () => {
            modalEl.classList.remove('modal-enter');
            setTimeout(resetModalToSetup, 300);
        };

        document.getElementById('open-modal-btn').addEventListener('click', () => { resetModalToSetup(); openModalFn(); });
        document.getElementById('open-modal-btn-mobile').addEventListener('click', () => { resetModalToSetup(); openModalFn(); });
        document.getElementById('close-modal-btn').addEventListener('click', closeModalFn);

        window.showFormStatus = (msg, isError = false) => {
            statusBoxEl.textContent = msg;
            statusBoxEl.className = `text-sm py-2 px-3 rounded mt-2 ${isError ? 'bg-rose-50 text-rose-600 border border-rose-200' : 'bg-emerald-50 text-emerald-600 border border-emerald-200'}`;
            statusBoxEl.classList.remove('hidden');
        };

        const SUPABASE_URL = "https://hlmpgjvvnezpgobgbtwy.supabase.co";
        const SUPABASE_KEY = "sb_publishable_QJ8O--Xo_AQLqEGmibpiGQ_iO75gSig";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 渲染动态章节
        const renderDynamicChapters = (cardsData) => {
            const mainContainer = document.querySelector('#main-content-container > div');
            const navMenu = document.getElementById('nav-menu-container');
            const datalistEl = document.getElementById('chapter-datalist');

            document.querySelectorAll('.dyn-chapter-nav').forEach(el => el.remove());
            document.querySelectorAll('.dyn-chapter-sec').forEach(el => el.remove());
            datalistEl.innerHTML = '';

            // 如果没有任何数据，显示空缺省页
            if (!cardsData || cardsData.length === 0) {
                mainContainer.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full text-indigo-300 mt-32 text-center">
                        <div class="text-6xl mb-4">🚀</div>
                        <h2 class="text-2xl font-bold text-indigo-900 mb-2">题库空空如也</h2>
                        <p class="text-indigo-600">请点击左下角的「➕ 补充面经或卡片」开始构建你的专属八股文库！</p>
                    </div>
                `;
                return;
            }

            mainContainer.innerHTML = ''; // 清理缺省页

            const chaptersMap = {};
            cardsData.forEach(item => {
                const chap = item.chapter ? item.chapter.replace(/^\d+\.\s*/, '').trim() : "其他补充";
                if (!chaptersMap[chap]) chaptersMap[chap] = [];
                chaptersMap[chap].push(item);
            });

            let currentChapterNum = 1; // 纯净版从 1 开始编号
            let isFirst = true; // 用于标记第一个章节，使其默认激活

            Object.keys(chaptersMap).forEach((chapterName) => {
                const safeId = "sec-dyn-" + encodeURIComponent(chapterName).replace(/%/g, '');
                const displayTitle = `${currentChapterNum}. ${chapterName}`;

                const option = document.createElement('option');
                option.value = chapterName;
                datalistEl.appendChild(option);

                // 左导航 (第一个章节默认选中 active)
                const navBtn = document.createElement('button');
                navBtn.className = "nav-item dyn-chapter-nav text-left px-6 py-3 text-sm text-indigo-700 hover:bg-indigo-50 whitespace-nowrap md:whitespace-normal" + (isFirst ? " active" : "");
                navBtn.setAttribute('data-target', safeId);
                navBtn.innerHTML = displayTitle;
                navMenu.appendChild(navBtn);

                // 右内容 (第一个章节默认展示 active)
                const sectionHtml = document.createElement('section');
                sectionHtml.id = safeId;
                sectionHtml.className = "section-view dyn-chapter-sec" + (isFirst ? " active" : "");
                
                let cardsHtml = '';
                chaptersMap[chapterName].forEach(card => {
                    cardsHtml += `
                        <div class="bg-white border border-indigo-100 rounded-xl p-6 shadow-sm hover:shadow-md transition-all relative group/card">
                            <div class="absolute top-4 right-4 flex gap-2 opacity-0 group-hover/card:opacity-100 transition-opacity z-10">
                                <button class="action-edit-btn p-1.5 bg-indigo-50 text-indigo-600 rounded hover:bg-indigo-100 shadow-sm transition-colors" data-id="${card.id}" title="编辑">✏️</button>
                                <button class="action-delete-btn p-1.5 bg-rose-50 text-rose-600 rounded hover:bg-rose-100 shadow-sm transition-colors" data-id="${card.id}" title="删除">🗑️</button>
                            </div>
                            <div class="flex items-center gap-3 mb-4 pr-20">
                                <div class="text-3xl">${card.icon}</div>
                                <h3 class="text-xl font-bold text-indigo-950">${card.title}</h3>
                            </div>
                            <div class="bg-indigo-50/50 p-4 rounded-lg border border-indigo-100 text-sm text-indigo-900 whitespace-pre-wrap leading-relaxed">${card.content}</div>
                        </div>
                    `;
                });

                sectionHtml.innerHTML = `
                    <header class="mb-10 border-b border-indigo-100 pb-4">
                        <h2 class="text-3xl font-extrabold text-indigo-950 mb-2">${displayTitle}</h2>
                        <p class="text-indigo-500 text-sm">面试题库 · 动态加载</p>
                    </header>
                    <div class="grid grid-cols-1 gap-6 mb-6">
                        ${cardsHtml}
                    </div>
                    <button class="action-add-to-chapter-btn w-full py-4 border-2 border-dashed border-indigo-200 hover:border-indigo-400 hover:bg-indigo-50/50 rounded-xl text-indigo-400 hover:text-indigo-600 transition-all font-medium flex justify-center items-center gap-2" data-chapter="${chapterName}">
                        <span>➕</span> 录入新的面试题
                    </button>
                `;
                mainContainer.appendChild(sectionHtml);
                currentChapterNum++;
                isFirst = false;
            });
        };

        const fetchNotesFromCloud = async () => {
            try {
                // 注意这里连接的是全新的表 interview_notes
                const { data, error } = await supabaseClient.from('interview_notes').select('*').order('created_at', { ascending: true });
                if (error) throw error;
                currentCloudCards = data; 
                renderDynamicChapters(data);
            } catch (error) {
                console.error("加载云端数据失败:", error);
            }
        };

        document.getElementById('main-content-container').addEventListener('click', async (e) => {
            const addBtn = e.target.closest('.action-add-to-chapter-btn');
            if (addBtn) {
                const chapter = addBtn.getAttribute('data-chapter');
                resetModalToSetup();
                document.getElementById('card-chapter').value = chapter;
                openModalFn();
                return;
            }

            const deleteBtn = e.target.closest('.action-delete-btn');
            if (deleteBtn) {
                const id = deleteBtn.getAttribute('data-id');
                if (confirm('🚨 确定要删除这道面试题吗？')) {
                    const originalHtml = deleteBtn.innerHTML;
                    deleteBtn.innerHTML = '⏳';
                    try {
                        const { error } = await supabaseClient.from('interview_notes').delete().eq('id', id);
                        if (error) throw error;
                        fetchNotesFromCloud();
                    } catch(err) {
                        alert('删除失败！');
                        deleteBtn.innerHTML = originalHtml;
                    }
                }
                return;
            }

            const editBtn = e.target.closest('.action-edit-btn');
            if (editBtn) {
                const id = editBtn.getAttribute('data-id');
                const targetCard = currentCloudCards.find(c => c.id == id);
                if (targetCard) {
                    editingCardId = id;
                    modalTitleEl.innerHTML = '✏️ <span class="text-indigo-600">修改内容</span>';
                    submitBtnEl.textContent = '保存修改';
                    document.getElementById('card-chapter').value = targetCard.chapter;
                    document.getElementById('card-title').value = targetCard.title;
                    document.getElementById('card-content').value = targetCard.content;
                    document.getElementById('card-icon').value = targetCard.icon;
                    openModalFn();
                }
            }
        });

        fetchNotesFromCloud();

        formEl.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const rawChapter = document.getElementById('card-chapter').value.trim();
            const cleanChapter = rawChapter.replace(/^\d+\.\s*/, '');
            const title = document.getElementById('card-title').value.trim();
            const content = document.getElementById('card-content').value.trim();
            const icon = document.getElementById('card-icon').value.trim();

            submitBtnEl.disabled = true;
            submitBtnEl.innerHTML = editingCardId ? '正在保存...' : '正在写入云端...';

            const payload = { chapter: cleanChapter, title: title, content: content, icon: icon };

            try {
                let errorObj;
                if (editingCardId) {
                    const { error } = await supabaseClient.from('interview_notes').update(payload).eq('id', editingCardId);
                    errorObj = error;
                } else {
                    const { error } = await supabaseClient.from('interview_notes').insert([payload]);
                    errorObj = error;
                }

                if (errorObj) throw errorObj;
                
                window.showFormStatus(editingCardId ? "✅ 修改已保存！" : "✅ 成功录入考点！");
                fetchNotesFromCloud(); 
                
                setTimeout(() => {
                    closeModalFn();
                    submitBtnEl.disabled = false;
                    
                    const safeId = "sec-dyn-" + encodeURIComponent(cleanChapter).replace(/%/g, '');
                    setTimeout(() => {
                        const targetNavBtn = document.querySelector(`[data-target="${safeId}"]`);
                        if(targetNavBtn) targetNavBtn.click();
                    }, 100);
                }, 1000);

            } catch (error) {
                console.error("提交失败", error);
                window.showFormStatus("操作失败，请确认网络连接或数据表配置", true);
                submitBtnEl.disabled = false;
                submitBtnEl.innerHTML = editingCardId ? '保存修改' : '发布内容';
            }
        });
    </script>
</body>
</html>
